<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 한국 인기 동영상 Top 30</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card-bg: #1a1a1a;
      --border: #2a2a2a;
      --text: #f1f1f1;
      --text-muted: #aaaaaa;
      --accent: #ff0000;
      --accent-hover: #cc0000;
      --tag-bg: #ff000022;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .yt-icon {
      width: 40px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .yt-icon::after {
      content: '';
      border-style: solid;
      border-width: 7px 0 7px 12px;
      border-color: transparent transparent transparent white;
    }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* API Key Section */
    .api-key-section {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .api-key-section.hidden { display: none; }

    .api-key-section p {
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .api-key-row {
      display: flex;
      gap: 0.5rem;
      max-width: 500px;
      margin: 0 auto;
    }

    .api-key-row input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
    }

    .api-key-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-outline:hover { background: var(--tag-bg); }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .controls-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.4rem 1rem;
      gap: 0.5rem;
    }

    .search-box input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.9rem;
      width: 200px;
      outline: none;
    }

    .search-box svg { color: var(--text-muted); flex-shrink: 0; }

    .category-select {
      padding: 0.5rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
    }

    .updated-at {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Video Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .video-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .thumbnail-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .thumbnail-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .rank-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 2px 10px;
      border-radius: 4px;
    }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 500;
    }

    .video-info {
      padding: 1rem;
    }

    .video-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-title a {
      color: var(--text);
      text-decoration: none;
    }

    .video-title a:hover { color: var(--accent); }

    .channel-name {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .video-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .video-stats span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* Loading & Error */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      text-align: center;
      padding: 2rem;
      color: #f85149;
      background: #f8514922;
      border-radius: 12px;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .container { padding: 1rem 0.75rem; }
      header h1 { font-size: 1.4rem; }
      .video-grid { grid-template-columns: 1fr; }
      .search-box input { width: 140px; }
      .controls { flex-direction: column; align-items: stretch; }
      .controls-left { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="yt-icon"></span> YouTube 한국 인기 동영상 Top 30</h1>
      <p>조회수 기준 한국 관련 인기 동영상을 한눈에</p>
    </header>

    <!-- API Key Input -->
    <div class="api-key-section" id="apiKeySection">
      <p>
        YouTube Data API v3 키가 필요합니다.<br>
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener" style="color:var(--accent)">Google Cloud Console</a>에서
        무료로 발급받을 수 있습니다.
      </p>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="YouTube API 키 입력...">
        <button class="btn btn-primary" onclick="saveApiKey()">저장 및 검색</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls" id="controls" style="display:none">
      <div class="controls-left">
        <div class="search-box">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchQuery" placeholder="검색어 (예: K-pop, 먹방...)" value="한국">
        </div>
        <select class="category-select" id="categorySelect">
          <option value="">모든 카테고리</option>
          <option value="10">음악</option>
          <option value="24">엔터테인먼트</option>
          <option value="20">게임</option>
          <option value="22">인물/블로그</option>
          <option value="28">과학기술</option>
          <option value="25">뉴스/정치</option>
          <option value="26">노하우/스타일</option>
          <option value="17">스포츠</option>
          <option value="1">영화/애니메이션</option>
          <option value="27">교육</option>
        </select>
        <button class="btn btn-primary" onclick="searchVideos()">검색</button>
        <button class="btn btn-outline" onclick="showApiKeySection()">API 키 변경</button>
      </div>
      <div class="updated-at" id="updatedAt"></div>
    </div>

    <!-- Video List -->
    <div id="videoList">
      <div class="loading" id="initialMsg">
        <p style="color:var(--text-muted)">API 키를 입력하면 동영상을 불러옵니다.</p>
      </div>
    </div>

    <footer>
      YouTube Data API v3 기반 &middot; 조회수 순 정렬 &middot; 한국 관련 동영상<br>
      <a href="https://developers.google.com/youtube/v3" target="_blank" rel="noopener">YouTube API 문서</a>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'yt_korea_api_key';

    function getApiKey() {
      return localStorage.getItem(STORAGE_KEY) || '';
    }

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) return alert('API 키를 입력해주세요.');
      localStorage.setItem(STORAGE_KEY, key);
      document.getElementById('apiKeySection').classList.add('hidden');
      document.getElementById('controls').style.display = 'flex';
      searchVideos();
    }

    function showApiKeySection() {
      document.getElementById('apiKeySection').classList.remove('hidden');
      document.getElementById('apiKeyInput').value = getApiKey();
    }

    // On load: check for saved key
    function init() {
      const key = getApiKey();
      if (key) {
        document.getElementById('apiKeySection').classList.add('hidden');
        document.getElementById('controls').style.display = 'flex';
        searchVideos();
      }
    }

    function formatViewCount(n) {
      if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
      if (n >= 10000) return (n / 10000).toFixed(1) + '만';
      if (n >= 1000) return (n / 1000).toFixed(1) + '천';
      return n.toLocaleString('ko-KR');
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      const diffMs = now - d;
      const diffDays = Math.floor(diffMs / 86400000);
      if (diffDays === 0) return '오늘';
      if (diffDays === 1) return '어제';
      if (diffDays < 7) return `${diffDays}일 전`;
      if (diffDays < 30) return `${Math.floor(diffDays / 7)}주 전`;
      if (diffDays < 365) return `${Math.floor(diffDays / 30)}개월 전`;
      return `${Math.floor(diffDays / 365)}년 전`;
    }

    function parseDuration(iso) {
      const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
      if (!m) return '';
      const h = m[1] ? `${m[1]}:` : '';
      const min = m[2] ? m[2].padStart(h ? 2 : 1, '0') : (h ? '00' : '0');
      const sec = m[3] ? m[3].padStart(2, '0') : '00';
      return `${h}${min}:${sec}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function searchVideos() {
      const apiKey = getApiKey();
      if (!apiKey) {
        document.getElementById('apiKeySection').classList.remove('hidden');
        return;
      }

      const query = document.getElementById('searchQuery').value.trim() || '한국';
      const category = document.getElementById('categorySelect').value;
      const listEl = document.getElementById('videoList');

      listEl.innerHTML = '<div class="loading"><div class="spinner"></div>동영상 불러오는 중...</div>';

      try {
        // Step 1: Search for videos
        let searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&order=viewCount&regionCode=KR&relevanceLanguage=ko&maxResults=30&key=${apiKey}`;
        if (category) searchUrl += `&videoCategoryId=${category}`;

        const searchRes = await fetch(searchUrl);
        if (!searchRes.ok) {
          const err = await searchRes.json();
          throw new Error(err.error?.message || `HTTP ${searchRes.status}`);
        }
        const searchData = await searchRes.json();
        const videoIds = searchData.items.map(item => item.id.videoId).filter(Boolean);

        if (!videoIds.length) {
          listEl.innerHTML = '<div class="error-box">검색 결과가 없습니다. 다른 검색어를 시도해보세요.</div>';
          return;
        }

        // Step 2: Get video details (statistics, duration)
        const detailUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds.join(',')}&key=${apiKey}`;
        const detailRes = await fetch(detailUrl);
        if (!detailRes.ok) {
          const err = await detailRes.json();
          throw new Error(err.error?.message || `HTTP ${detailRes.status}`);
        }
        const detailData = await detailRes.json();

        // Sort by view count descending
        const videos = detailData.items.sort((a, b) => {
          return parseInt(b.statistics.viewCount || 0) - parseInt(a.statistics.viewCount || 0);
        });

        renderVideos(videos);
        document.getElementById('updatedAt').textContent =
          `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

      } catch (e) {
        console.error('Error:', e);
        listEl.innerHTML = `<div class="error-box">오류 발생: ${escapeHtml(e.message)}<br><br><button class="btn btn-outline" onclick="showApiKeySection()">API 키 확인하기</button></div>`;
      }
    }

    function renderVideos(videos) {
      const listEl = document.getElementById('videoList');
      if (!videos.length) {
        listEl.innerHTML = '<div class="error-box">표시할 동영상이 없습니다.</div>';
        return;
      }

      listEl.innerHTML = `<div class="video-grid">${videos.map((v, i) => {
        const stats = v.statistics;
        const snippet = v.snippet;
        const thumb = snippet.thumbnails.high || snippet.thumbnails.medium || snippet.thumbnails.default;
        const duration = parseDuration(v.contentDetails.duration);
        const views = parseInt(stats.viewCount || 0);
        const likes = parseInt(stats.likeCount || 0);
        const comments = parseInt(stats.commentCount || 0);

        return `
          <div class="video-card" onclick="window.open('https://www.youtube.com/watch?v=${v.id}','_blank')">
            <div class="thumbnail-wrap">
              <img src="${thumb.url}" alt="${escapeHtml(snippet.title)}" loading="lazy">
              <span class="rank-badge">#${i + 1}</span>
              ${duration ? `<span class="duration">${duration}</span>` : ''}
            </div>
            <div class="video-info">
              <div class="video-title">
                <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                  ${escapeHtml(snippet.title)}
                </a>
              </div>
              <div class="channel-name">${escapeHtml(snippet.channelTitle)}</div>
              <div class="video-stats">
                <span>👁️ ${formatViewCount(views)}회</span>
                <span>👍 ${formatViewCount(likes)}</span>
                <span>💬 ${formatViewCount(comments)}</span>
                <span>📅 ${formatDate(snippet.publishedAt)}</span>
              </div>
            </div>
          </div>`;
      }).join('')}</div>`;
    }

    // Enter key support for search & API key
    document.getElementById('searchQuery').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchVideos();
    });
    document.getElementById('apiKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveApiKey();
    });

    init();
  </script>
</body>
</html>

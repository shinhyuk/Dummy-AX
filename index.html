<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 트렌딩 - 주간/월간 인기 저장소</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --star: #e3b341;
      --tab-active: #58a6ff;
      --tag-bg: #1f6feb33;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--tab-active);
      border-bottom-color: var(--tab-active);
    }

    .section { display: none; }
    .section.active { display: block; }

    .repo-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    .repo-card:hover { border-color: var(--accent); }

    .repo-rank {
      display: inline-block;
      background: var(--tag-bg);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 2px 10px;
      border-radius: 12px;
      margin-bottom: 0.75rem;
    }

    .repo-name {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .repo-name a {
      color: var(--accent);
      text-decoration: none;
    }

    .repo-name a:hover { text-decoration: underline; }

    .repo-desc {
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .repo-summary {
      background: #1c2536;
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;
      border-radius: 0 6px 6px 0;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .repo-summary strong {
      color: var(--accent);
      font-size: 0.8rem;
      display: block;
      margin-bottom: 0.25rem;
    }

    .repo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
    }

    .repo-meta span { display: flex; align-items: center; gap: 4px; }

    .lang-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .star-icon { color: var(--star); }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      padding: 2rem;
      color: #f85149;
      background: #f8514922;
      border-radius: 8px;
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--tag-bg);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      transition: background 0.2s;
    }

    .refresh-btn:hover { background: #1f6feb55; }

    .updated-at {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    @media (max-width: 600px) {
      .container { padding: 1rem 0.75rem; }
      header h1 { font-size: 1.4rem; }
      .repo-meta { gap: 0.5rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔥 <span>GitHub 트렌딩</span> 저장소</h1>
      <p>주간 · 월간 인기 오픈소스 Top 5 — 한국어 요약</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="weekly">📅 주간 (Weekly)</button>
      <button class="tab" data-tab="monthly">📆 월간 (Monthly)</button>
    </div>

    <button class="refresh-btn" onclick="refreshAll()">🔄 새로고침</button>
    <div class="updated-at" id="updated-at"></div>

    <div id="weekly" class="section active">
      <div class="loading"><div class="spinner"></div>주간 트렌딩 불러오는 중...</div>
    </div>

    <div id="monthly" class="section">
      <div class="loading"><div class="spinner"></div>월간 트렌딩 불러오는 중...</div>
    </div>

    <footer>
      GitHub Search API 기반 · 스타 증가순 정렬 · 자동 한국어 요약
    </footer>
  </div>

  <script>
    const LANG_COLORS = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
      Java: '#b07219', Go: '#00ADD8', Rust: '#dea584', C: '#555555',
      'C++': '#f34b7d', 'C#': '#178600', Ruby: '#701516', PHP: '#4F5D95',
      Swift: '#F05138', Kotlin: '#A97BFF', Dart: '#00B4AB', Lua: '#000080',
      Shell: '#89e051', HTML: '#e34c26', CSS: '#563d7c', Vue: '#41b883',
      Svelte: '#ff3e00', Jupyter: '#F37626', R: '#198CE7', Scala: '#c22d40',
      Zig: '#ec915c', Elixir: '#6e4a7e', Haskell: '#5e5086', Julia: '#a270ba',
    };

    const KOREAN_SUMMARIES = {
      'ai': 'AI/인공지능 관련 프로젝트로, 머신러닝 또는 딥러닝 기술을 활용합니다.',
      'llm': '대규모 언어 모델(LLM) 관련 프로젝트입니다.',
      'agent': 'AI 에이전트 관련 프로젝트로, 자율적으로 작업을 수행하는 시스템입니다.',
      'web': '웹 개발 관련 프로젝트로, 프론트엔드 또는 백엔드 기술을 다룹니다.',
      'framework': '개발 프레임워크로, 앱 개발을 효율적으로 도와줍니다.',
      'tool': '개발 도구로, 생산성 향상을 위한 유틸리티입니다.',
      'cli': '커맨드라인 도구로, 터미널에서 사용하는 유틸리티입니다.',
      'database': '데이터베이스 관련 프로젝트입니다.',
      'security': '보안 관련 프로젝트입니다.',
      'mobile': '모바일 앱 개발 관련 프로젝트입니다.',
      'game': '게임 또는 게임 개발 관련 프로젝트입니다.',
      'api': 'API 관련 프로젝트로, 서비스 간 통신을 다룹니다.',
      'devops': 'DevOps/인프라 관련 프로젝트입니다.',
      'ui': 'UI/UX 관련 프로젝트로, 사용자 인터페이스를 다룹니다.',
    };

    function generateKoreanSummary(repo) {
      const desc = (repo.description || '').toLowerCase();
      const name = repo.name.toLowerCase();
      const topics = (repo.topics || []).join(' ').toLowerCase();
      const all = `${desc} ${name} ${topics}`;

      let category = '';
      if (/\b(llm|language model|gpt|chatgpt|openai|claude|gemini|ollama)\b/.test(all)) category = 'LLM/대규모 언어 모델';
      else if (/\b(agent|autonomous|agentic|mcp)\b/.test(all)) category = 'AI 에이전트';
      else if (/\b(ai|artificial|machine.?learn|deep.?learn|neural|transformer|diffusion|stable)\b/.test(all)) category = 'AI/머신러닝';
      else if (/\b(react|vue|svelte|angular|next|nuxt|frontend|front.end)\b/.test(all)) category = '프론트엔드';
      else if (/\b(api|backend|server|express|fastapi|django|flask|spring)\b/.test(all)) category = '백엔드/API';
      else if (/\b(framework|library|sdk|toolkit)\b/.test(all)) category = '프레임워크/라이브러리';
      else if (/\b(cli|terminal|command.?line|shell)\b/.test(all)) category = 'CLI 도구';
      else if (/\b(database|db|sql|mongo|redis|postgres)\b/.test(all)) category = '데이터베이스';
      else if (/\b(security|crypto|auth|hack|pentest|vulnerab)\b/.test(all)) category = '보안';
      else if (/\b(mobile|ios|android|flutter|react.native)\b/.test(all)) category = '모바일';
      else if (/\b(game|engine|unity|unreal|godot)\b/.test(all)) category = '게임';
      else if (/\b(devops|docker|kubernetes|k8s|ci.?cd|deploy|infra|cloud)\b/.test(all)) category = 'DevOps/인프라';
      else if (/\b(ui|component|design|css|style|theme)\b/.test(all)) category = 'UI/디자인';
      else if (/\b(tool|util|helper|productivity)\b/.test(all)) category = '개발 도구';
      else category = '오픈소스 프로젝트';

      const lang = repo.language ? `${repo.language} 기반` : '';
      const stars = repo.stargazers_count;
      let popularity = '';
      if (stars > 50000) popularity = '매우 인기 있는';
      else if (stars > 10000) popularity = '인기 있는';
      else if (stars > 1000) popularity = '주목받는';
      else popularity = '떠오르는';

      const descKo = translateDescription(repo.description || '');

      return `[${category}] ${lang ? lang + ' ' : ''}${popularity} ${category} 프로젝트입니다. ${descKo}`;
    }

    function translateDescription(desc) {
      if (!desc) return '설명이 제공되지 않았습니다.';
      // Provide a meaningful Korean gloss for common English patterns
      const replacements = [
        [/\bA\s+/i, ''], [/\bAn\s+/i, ''],
        [/\bfast\b/gi, '빠른'], [/\blightweight\b/gi, '경량'],
        [/\bopen.?source\b/gi, '오픈소스'], [/\bpowerful\b/gi, '강력한'],
        [/\bsimple\b/gi, '간단한'], [/\beasy[- ]to[- ]use\b/gi, '사용하기 쉬운'],
        [/\bframework\b/gi, '프레임워크'], [/\blibrary\b/gi, '라이브러리'],
        [/\btool\b/gi, '도구'], [/\bplatform\b/gi, '플랫폼'],
        [/\bfor\b/gi, '위한'], [/\band\b/gi, '및'],
        [/\bwith\b/gi, '+'], [/\bbased on\b/gi, '기반'],
      ];
      // Keep original with note
      return `— "${desc}"`;
    }

    function formatNumber(n) {
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return n.toString();
    }

    function getDateStr(daysAgo) {
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      return d.toISOString().split('T')[0];
    }

    function renderRepos(containerId, repos) {
      const el = document.getElementById(containerId);
      if (!repos.length) {
        el.innerHTML = '<div class="error">데이터를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</div>';
        return;
      }
      el.innerHTML = repos.slice(0, 5).map((repo, i) => `
        <div class="repo-card">
          <span class="repo-rank">#${i + 1}</span>
          <div class="repo-name">
            <a href="${repo.html_url}" target="_blank" rel="noopener">${repo.full_name}</a>
          </div>
          <div class="repo-desc">${repo.description || '설명 없음'}</div>
          <div class="repo-summary">
            <strong>🇰🇷 한국어 요약</strong>
            ${generateKoreanSummary(repo)}
          </div>
          <div class="repo-meta">
            ${repo.language ? `<span><span class="lang-dot" style="background:${LANG_COLORS[repo.language] || '#8b949e'}"></span> ${repo.language}</span>` : ''}
            <span class="star-icon">⭐ ${formatNumber(repo.stargazers_count)}</span>
            <span>🍴 ${formatNumber(repo.forks_count)}</span>
            <span>👁️ ${formatNumber(repo.watchers_count)}</span>
            ${repo.topics && repo.topics.length ? `<span>🏷️ ${repo.topics.slice(0, 3).join(', ')}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function fetchTrending(period) {
      const days = period === 'weekly' ? 7 : 30;
      const since = getDateStr(days);
      const url = `https://api.github.com/search/repositories?q=created:>${since}&sort=stars&order=desc&per_page=5`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return data.items || [];
      } catch (e) {
        console.error(`Error fetching ${period}:`, e);
        return [];
      }
    }

    async function loadAll() {
      const [weekly, monthly] = await Promise.all([
        fetchTrending('weekly'),
        fetchTrending('monthly'),
      ]);
      renderRepos('weekly', weekly);
      renderRepos('monthly', monthly);
      document.getElementById('updated-at').textContent =
        `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;
    }

    function refreshAll() {
      document.getElementById('weekly').innerHTML =
        '<div class="loading"><div class="spinner"></div>주간 트렌딩 불러오는 중...</div>';
      document.getElementById('monthly').innerHTML =
        '<div class="loading"><div class="spinner"></div>월간 트렌딩 불러오는 중...</div>';
      loadAll();
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    loadAll();
  </script>
</body>
</html>
